<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Survey Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}


body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
rgba(0,0,0,.6),
rgba(0,0,0,.6)
),
url("https://images.unsplash.com/photo-1556761175-b413da4baf72");

background-size:cover;

color:white;

}



.login-box{

width:380px;

padding:35px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border-radius:30px;

box-shadow:0 0 30px rgba(0,255,149,.3);

}



h1{

text-align:center;

color:#00ff95;

margin-bottom:25px;

}



input{

width:100%;

padding:15px;

margin:10px 0;

border:none;

outline:none;

border-radius:15px;

background:rgba(255,255,255,.15);

color:white;

}


input::placeholder{

color:#ddd;

}



button{

width:100%;

padding:15px;

margin-top:20px;

border:none;

border-radius:30px;

background:#00ff95;

color:#07111f;

font-size:16px;

font-weight:bold;

cursor:pointer;

box-shadow:0 0 20px #00ff95;

}



.register{

text-align:center;

margin-top:20px;

}



a{

color:#00ff95;

text-decoration:none;

}


</style>

</head>



<body>


<div class="login-box">


<h1>
Welcome Back 👋
</h1>


<input 
id="phone"
placeholder="Phone Number">



<input 
id="password"
type="password"
placeholder="Password">



<button onclick="loginUser()">

Login

</button>



<div class="register">

Don't have an account?

<a href="register.html">
Register
</a>

</div>


</div>





<script>


async function loginUser(){


const phone =
document.getElementById("phone").value;


const password =
document.getElementById("password").value;



const response = await fetch(

"http://localhost:5000/api/auth/login",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

phone,
password

})


}

);



const data = await response.json();



if(response.ok){


localStorage.setItem(
"token",
data.token
);


localStorage.setItem(
"user",
JSON.stringify(data.user)
);



window.location.href="dashboard.html";


}

else{

alert(data.message);

}


}



</script>


</body>

  </html>
