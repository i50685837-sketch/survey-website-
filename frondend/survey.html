<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Survey Hub - Surveys</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}


body{

background:#07111f;

color:white;

padding:25px;

}



.top{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}



h1{

color:#00ff95;

}



.back{

background:#0984e3;

color:white;

padding:12px 25px;

border:none;

border-radius:25px;

cursor:pointer;

}




.surveys{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:25px;

}




.card{

background:

rgba(255,255,255,.12);

backdrop-filter:blur(20px);

padding:25px;

border-radius:25px;

box-shadow:
0 0 25px rgba(0,255,149,.15);

transition:.3s;

}



.card:hover{

transform:translateY(-8px);

}




.category{

display:inline-block;

background:#8e44ad;

padding:6px 15px;

border-radius:20px;

font-size:12px;

}



.card h2{

margin-top:15px;

color:#00ff95;

}



.description{

color:#ddd;

margin:15px 0;

}



.info{

display:flex;

justify-content:space-between;

margin-bottom:20px;

}


.reward{

color:#ffd700;

font-weight:bold;

}



button{

width:100%;

padding:14px;

border:none;

border-radius:30px;

background:#00ff95;

font-weight:bold;

cursor:pointer;

font-size:15px;

}



button:hover{

transform:scale(1.03);

}



</style>


</head>


<body>


<div class="top">

<h1>
📝 Surveys
</h1>


<button class="back" onclick="location.href='dashboard.html'">
⬅ Dashboard
</button>


</div>



<div class="surveys" id="surveyList">


</div>





<script>


const token = localStorage.getItem("token");



async function loadSurveys(){


const response = await fetch(

"http://localhost:5000/api/survey/all",

{

headers:{

Authorization:
"Bearer "+token

}

}

);



const surveys = await response.json();



const container =
document.getElementById("surveyList");



surveys.forEach(survey=>{


container.innerHTML += `


<div class="card">


<span class="category">
Survey
</span>


<h2>
${survey.title}
</h2>



<p class="description">

${survey.description}

</p>



<div class="info">

<span>
❓ ${survey.questions} Questions
</span>


<span class="reward">
🎁 ${survey.reward} Points
</span>


</div>



<button onclick="completeSurvey('${survey._id}')">

Complete Survey 🚀

</button>



</div>


`;


});



}



async function completeSurvey(id){



const response = await fetch(

"http://localhost:5000/api/survey/complete/"+id,

{

method:"POST",

headers:{

Authorization:
"Bearer "+token

}

}

);



const data = await response.json();


alert(data.message);



}



loadSurveys();


</script>


</body>

</html>
