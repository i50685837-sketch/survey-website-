<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Survey Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}


body{

min-height:100vh;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.55)
),
url("https://images.unsplash.com/photo-1556761175-b413da4baf72");

background-size:cover;
background-position:center;

color:white;

}


/* Header */

header{

display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;

}


.logo{

font-size:30px;
font-weight:700;
color:#00ff95;

}


.auth button{

padding:12px 25px;
border:none;
border-radius:30px;
margin-left:10px;
font-weight:bold;
cursor:pointer;

}


.login{

background:white;
color:#07111f;

}


.register{

background:#00ff95;

}



/* Hero */

.hero{

height:70vh;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

}



.glass{

max-width:750px;

padding:45px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border-radius:30px;

box-shadow:
0 0 30px rgba(0,255,149,.25);

}



.glass h1{

font-size:45px;

}


.glass span{

color:#00ff95;

}


.glass p{

margin-top:20px;

font-size:18px;

}



/* Start button */

.start{

margin-top:30px;

padding:16px 45px;

border:none;

border-radius:35px;

background:#00ff95;

color:#07111f;

font-size:18px;

font-weight:700;

cursor:pointer;


box-shadow:
0 0 20px rgba(0,255,149,.8);


transition:.3s;

}



.start:hover{

transform:scale(1.08);


box-shadow:
0 0 45px rgba(0,255,149,1);

}



/* Features */

.features{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

padding:20px;

}



.card{

width:220px;

padding:25px;

text-align:center;

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border-radius:20px;

}



.card h2{

font-size:35px;

color:#00ff95;

}


</style>

</head>


<body>


<header>

<div class="logo">
📝 Survey Hub
</div>


<div class="auth">

<button class="login" onclick="location.href='login.html'">
Login
</button>


<button class="register" onclick="location.href='register.html'">
Register
</button>

</div>

</header>




<section class="hero">


<div class="glass">


<h1>
Earn Rewards With
<span>Surveys</span>
</h1>


<p>
Complete surveys, collect points and turn your opinions into rewards.
</p>



<button class="start" onclick="startEarning()">
🚀 Start Earning
</button>



</div>


</section>





<section class="features">


<div class="card">

<h2>📝</h2>

<h3>Surveys</h3>

<p>
Answer questions and earn points.
</p>

</div>



<div class="card">

<h2>🎁</h2>

<h3>Rewards</h3>

<p>
Claim your earned rewards.
</p>

</div>



<div class="card">

<h2>💰</h2>

<h3>Wallet</h3>

<p>
Track your balance.
</p>

</div>



</section>



<script>

function startEarning(){

window.location.href="register.html";

}

</script>


</body>

  </html>
